<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Collector</title>
    <script>
      // Single Page App redirect for GitHub Pages
      // https://github.com/rafgraph/spa-github-pages
      // Encodes the current path + query into a query-string parameter,
      // then redirects to index.html which will decode it and restore
      // the correct client-side route via History API.
      var pathSegmentsToKeep = 0;

      var l = window.location;
      l.replace(
        l.protocol +
          '//' +
          l.hostname +
          (l.port ? ':' + l.port : '') +
          l.pathname
            .split('/')
            .slice(0, 1 + pathSegmentsToKeep)
            .join('/') +
          '/?/' +
          l.pathname
            .slice(1)
            .split('/')
            .slice(pathSegmentsToKeep)
            .join('/')
            .replace(/&/g, '~and~') +
          (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash
      );
    </script>
  </head>
  <body></body>
</html>
