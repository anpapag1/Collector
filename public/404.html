<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Collector</title>
    <script>
      // GitHub Pages SPA redirect
            // Redirects all 404s to index.html preserving the original path.
                  // We store the intended path in sessionStorage and redirect to "/".
                        // The app's entry point reads it back and navigates accordingly.
                              sessionStorage.setItem('spa-redirect', window.location.pathname + window.location.search + window.location.hash);
      window.location.replace('/');
    </script>
  </head>
  <body></body>
</html>
